<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>مطعم وكافيه النكهات | أطلب أونلاين</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
            color: #2d3436;
        }

        /* تذييل ثابت للسلة */
        .cart-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            box-shadow: 0 -5px 25px rgba(0,0,0,0.1);
            padding: 15px 20px;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .cart-footer.show {
            transform: translateY(0);
        }

        .cart-footer-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .cart-total {
            font-size: 1.3rem;
            font-weight: bold;
            color: #e67e22;
        }

        .whatsapp-order-btn {
            background: #25D366;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .whatsapp-order-btn:hover {
            background: #128C7E;
            transform: scale(1.02);
        }

        /* تصميم عام */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: 100px;
        }

        /* الهيدر */
        .header {
            background: linear-gradient(135deg, #e67e22, #d35400);
            color: white;
            padding: 30px;
            border-radius: 25px;
            text-align: center;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.95;
        }

        .whatsapp-contact {
            margin-top: 15px;
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.9rem;
        }

        /* تبويبات القائمة */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .tab-btn {
            background: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            color: #2d3436;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .tab-btn.active {
            background: #e67e22;
            color: white;
        }

        .tab-btn:hover {
            transform: translateY(-2px);
        }

        /* بطاقات المنتجات */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .menu-item {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            transition: all 0.3s;
            cursor: pointer;
        }

        .menu-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }

        .item-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: linear-gradient(135deg, #ffecd2, #fcb69f);
        }

        .item-info {
            padding: 20px;
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .item-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: #2d3436;
        }

        .item-price {
            color: #e67e22;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .item-desc {
            color: #636e72;
            font-size: 0.9rem;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .add-to-cart {
            background: #e67e22;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            width: 100%;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .add-to-cart:hover {
            background: #d35400;
        }

        /* نافذة السلة المنبثقة */
        .cart-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .cart-modal.show {
            display: flex;
        }

        .cart-modal-content {
            background: white;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            border-radius: 25px;
            overflow: hidden;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .cart-modal-header {
            background: #e67e22;
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-modal-header h3 {
            font-size: 1.3rem;
        }

        .close-cart {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .cart-items-list {
            max-height: 400px;
            overflow-y: auto;
            padding: 20px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-name {
            font-weight: bold;
        }

        .cart-item-price {
            font-size: 0.9rem;
            color: #e67e22;
        }

        .cart-item-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .cart-item-actions button {
            background: #f0f0f0;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
        }

        .cart-item-qty {
            min-width: 30px;
            text-align: center;
        }

        .remove-item {
            color: #e74c3c;
            background: none;
            font-size: 1.1rem;
        }

        .cart-modal-footer {
            padding: 20px;
            border-top: 1px solid #eee;
        }

        .cart-total-modal {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
        }

        /* نموذج بيانات العميل */
        .customer-form {
            padding: 20px;
            border-top: 1px solid #eee;
            background: #f8f9fa;
        }

        .customer-form input,
        .customer-form textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
        }

        .customer-form textarea {
            resize: vertical;
            min-height: 80px;
        }

        /* رسائل التنبيه */
        .notification {
            position: fixed;
            bottom: 100px;
            right: 20px;
            background: #27ae60;
            color: white;
            padding: 12px 20px;
            border-radius: 50px;
            z-index: 1500;
            animation: slideIn 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        @keyframes slideIn {
            from {
                transform: translateX(100px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* شعار السلة */
        .cart-icon {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #e67e22;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            z-index: 1000;
            transition: all 0.3s;
        }

        .cart-icon:hover {
            transform: scale(1.1);
        }

        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #e74c3c;
            color: white;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
                padding-bottom: 80px;
            }
            .header h1 {
                font-size: 1.8rem;
            }
            .menu-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- الهيدر -->
    <div class="header">
        <h1>🍽 مطعم وكافيه النكهات</h1>
        <p>أشهى المأكولات والمشروبات في مكان واحد | أطلب الآن واستمتع بتجربة فريدة</p>
        <div class="whatsapp-contact">
            <i class="fab fa-whatsapp"></i> خدمة العملاء: 01234567890
        </div>
    </div>

    <!-- تبويبات القائمة -->
    <div class="tabs">
        <button class="tab-btn active" data-category="all">الكل</button>
        <button class="tab-btn" data-category="main">أكلات رئيسية</button>
        <button class="tab-btn" data-category="drinks">مشروبات</button>
        <button class="tab-btn" data-category="desserts">حلويات</button>
        <button class="tab-btn" data-category="offers">عروض خاصة</button>
    </div>

    <!-- قائمة المنتجات -->
    <div class="menu-grid" id="menuGrid"></div>
</div>

<!-- أيقونة السلة -->
<div class="cart-icon" id="cartIcon">
    <i class="fas fa-shopping-cart"></i>
    <span class="cart-count" id="cartCount">0</span>
</div>

<!-- نافذة السلة المنبثقة -->
<div class="cart-modal" id="cartModal">
    <div class="cart-modal-content">
        <div class="cart-modal-header">
            <h3><i class="fas fa-shopping-cart"></i> سلة الطلبات</h3>
            <button class="close-cart" id="closeCartBtn">&times;</button>
        </div>
        <div class="cart-items-list" id="cartItemsList">
            <p style="text-align: center; color: #888;">سلة الطلبات فارغة</p>
        </div>
        <div class="customer-form">
            <input type="text" id="customerName" placeholder="👤 الاسم الكامل" required>
            <input type="tel" id="customerPhone" placeholder="📞 رقم الهاتف" required>
            <textarea id="customerAddress" placeholder="📍 العنوان (المنطقة - الشارع - رقم المبنى)"></textarea>
            <textarea id="orderNotes" placeholder="📝 ملاحظات إضافية (اختياري)"></textarea>
        </div>
        <div class="cart-modal-footer">
            <div class="cart-total-modal">
                الإجمالي: <span id="modalTotalPrice">0</span> جنيه
            </div>
            <button class="whatsapp-order-btn" id="confirmOrderBtn" style="width: 100%; justify-content: center;">
                <i class="fab fa-whatsapp"></i> تأكيد الطلب عبر واتساب
            </button>
        </div>
    </div>
</div>

<!-- تذييل ثابت للسلة (يظهر عند وجود منتجات) -->
<div class="cart-footer" id="cartFooter">
    <div class="cart-footer-content">
        <div>
            <strong>إجمالي الطلب:</strong>
            <span class="cart-total" id="footerTotalPrice">0</span> جنيه
        </div>
        <button class="whatsapp-order-btn" id="footerOrderBtn">
            <i class="fab fa-whatsapp"></i> عرض السلة وتأكيد الطلب
        </button>
    </div>
</div>

<script>
    // بيانات المنتجات
    const menuItems = [
        // أكلات رئيسية
        { id: 1, name: "برجر لحم أنجوس", price: 95, category: "main", desc: "لحم أنجوس طازج مع جبنة شيدر، خس، طماطم، صوص سري", image: "🍔" },
        { id: 2, name: "شيش طاووق", price: 85, category: "main", desc: "صدور دجاج متبلة بالليمون والزعتر، مشوية على الفحم", image: "🍗" },
        { id: 3, name: "باستا ألفريدو", price: 75, category: "main", desc: "باستا طازجة مع صوص كريمة، فطر، ودجاج", image: "🍝" },
        { id: 4, name: "بيتزا مارجريتا", price: 65, category: "main", desc: "جبنة موزاريلا، طماطم، ريحان طازج", image: "🍕" },
        { id: 5, name: "كفتة أرز", price: 90, category: "main", desc: "كفتة لحم مشوية مع أرز بالشعرية وسلطة", image: "🥘" },
        
        // مشروبات
        { id: 6, name: "عصير مانجو", price: 35, category: "drinks", desc: "مانجو طازج 100%", image: "🥭" },
        { id: 7, name: "موهيتو نعناع", price: 30, category: "drinks", desc: "نعناع طازج، ليمون، صودا", image: "🍹" },
        { id: 8, name: "قهوة تركية", price: 25, category: "drinks", desc: "قهوة تركية أصيلة مع قطعة حلقوم", image: "☕" },
        { id: 9, name: "كابتشينو", price: 30, category: "drinks", desc: "إسبريسو مع حليب رغوي", image: "☕" },
        { id: 10, name: "شاي أخضر", price: 20, category: "drinks", desc: "شاي أخضر بالنعناع", image: "🍵" },
        
        // حلويات
        { id: 11, name: "أم علي", price: 45, category: "desserts", desc: "حلى شرقي تقليدي بالمكسرات", image: "🍮" },
        { id: 12, name: "تشيز كيك توت", price: 55, category: "desserts", desc: "تشيز كيك كريمي مع صوص التوت", image: "🍰" },
        { id: 13, name: "كنافة نابلسية", price: 50, category: "desserts", desc: "كنافة بالجبنة مع قطر", image: "🍯" },
        { id: 14, name: "بسبوسة جوز الهند", price: 35, category: "desserts", desc: "بسبوسة طرية مع جوز الهند", image: "🥥" },
        
        // عروض خاصة
        { id: 15, name: "وجبة العائلة", price: 250, category: "offers", desc: "بيتزا عائلية + باستا + 2 مشروب + حلوى", image: "🍱" },
        { id: 16, name: "عرض الغداء", price: 120, category: "offers", desc: "برجر + بطاطس + مشروب", image: "🍔🥤" },
        { id: 17, name: "عرض الكافيه", price: 80, category: "offers", desc: "كابتشينو + تشيز كيك", image: "☕🍰" }
    ];

    let cart = [];
    let currentCategory = "all";

    // تحديث واجهة المستخدم
    function renderMenu() {
        const grid = document.getElementById("menuGrid");
        const filteredItems = currentCategory === "all" 
            ? menuItems 
            : menuItems.filter(item => item.category === currentCategory);
        
        grid.innerHTML = filteredItems.map(item => `
            <div class="menu-item" onclick="addToCart(${item.id})">
                <div class="item-image" style="display: flex; align-items: center; justify-content: center; font-size: 4rem; background: linear-gradient(135deg, #f39c12, #e67e22);">
                    ${item.image}
                </div>
                <div class="item-info">
                    <div class="item-header">
                        <span class="item-name">${item.name}</span>
                        <span class="item-price">${item.price} جنيه</span>
                    </div>
                    <div class="item-desc">${item.desc}</div>
                    <button class="add-to-cart" onclick="event.stopPropagation(); addToCart(${item.id})">
                        <i class="fas fa-plus-circle"></i> أضف للطلب
                    </button>
                </div>
            </div>
        `).join("");
    }

    // إضافة للمشتريات
    function addToCart(itemId) {
        const item = menuItems.find(i => i.id === itemId);
        const existingItem = cart.find(i => i.id === itemId);
        
        if (existingItem) {
            existingItem.quantity++;
        } else {
            cart.push({ ...item, quantity: 1 });
        }
        
        updateCartUI();
        showNotification(`تم إضافة ${item.name} إلى السلة`, "#27ae60");
    }

    // تحديث واجهة السلة
    function updateCartUI() {
        const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
        const totalPrice = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        
        document.getElementById("cartCount").innerText = totalItems;
        document.getElementById("footerTotalPrice").innerText = totalPrice;
        document.getElementById("modalTotalPrice").innerText = totalPrice;
        
        // إظهار/إخفاء التذييل
        const footer = document.getElementById("cartFooter");
        if (cart.length > 0) {
            footer.classList.add("show");
        } else {
            footer.classList.remove("show");
        }
        
        // تحديث قائمة السلة في المودال
        const cartItemsDiv = document.getElementById("cartItemsList");
        if (cart.length === 0) {
            cartItemsDiv.innerHTML = '<p style="text-align: center; color: #888;">سلة الطلبات فارغة</p>';
        } else {
            cartItemsDiv.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <div class="cart-item-info">
                        <div class="cart-item-name">${item.name}</div>
                        <div class="cart-item-price">${item.price} جنيه × ${item.quantity}</div>
                    </div>
                    <div class="cart-item-actions">
                        <button onclick="updateQuantity(${item.id}, ${item.quantity - 1})">-</button>
                        <span class="cart-item-qty">${item.quantity}</span>
                        <button onclick="updateQuantity(${item.id}, ${item.quantity + 1})">+</button>
                        <button class="remove-item" onclick="removeFromCart(${item.id})">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
            `).join("");
        }
    }
    
    function updateQuantity(itemId, newQuantity) {
        if (newQuantity <= 0) {
            removeFromCart(itemId);
        } else {
            const item = cart.find(i => i.id === itemId);
            if (item) item.quantity = newQuantity;
            updateCartUI();
        }
    }
    
    function removeFromCart(itemId) {
        cart = cart.filter(item => item.id !== itemId);
        updateCartUI();
        showNotification("تم إزالة المنتج من السلة", "#e74c3c");
    }
    
    // تأكيد الطلب وإرسال واتساب
    function sendWhatsAppOrder() {
        const name = document.getElementById("customerName").value.trim();
        const phone = document.getElementById("customerPhone").value.trim();
        const address = document.getElementById("customerAddress").value.trim();
        const notes = document.getElementById("orderNotes").value.trim();
        
        if (!name || !phone) {
            showNotification("يرجى إدخال الاسم ورقم الهاتف", "#e74c3c");
            return false;
        }
        
        if (cart.length === 0) {
            showNotification("سلة الطلبات فارغة", "#e74c3c");
            return false;
        }
        
        // تنسيق رسالة الواتساب
        let message = "🍽 *طلب جديد من مطعم النكهات* 🍽\n\n";
        message += `👤 *العميل:* ${name}\n`;
        message += `📞 *الجوال:* ${phone}\n`;
        if (address) message += `📍 *العنوان:* ${address}\n`;
        message += "\n🛒 *تفاصيل الطلب:*\n";
        
        cart.forEach(item => {
            message += `• ${item.name} - ${item.quantity} × ${item.price} = ${item.price * item.quantity} جنيه\n`;
        });
        
        const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        message += `\n💰 *الإجمالي:* ${total} جنيه\n`;
        
        if (notes) message += `\n📝 *ملاحظات:* ${notes}\n`;
        
        message += "\n⏰ *يرجى التأكيد في أقرب وقت*";
        
        // رقم الواتساب الخاص بالمطعم (يمكن تعديله)
        const whatsappNumber = "201234567890"; // استبدل برقم واتساب المطعم بدون +
        const whatsappUrl = `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(message)}`;
        
        window.open(whatsappUrl, "_blank");
        return true;
    }
    
    function showNotification(msg, color) {
        const notif = document.createElement("div");
        notif.className = "notification";
        notif.style.background = color;
        notif.innerHTML = `<i class="fas fa-check-circle"></i> ${msg}`;
        document.body.appendChild(notif);
        setTimeout(() => notif.remove(), 2500);
    }
    
    // أحداث الأزرار
    document.querySelectorAll(".tab-btn").forEach(btn => {
        btn.addEventListener("click", () => {
            document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            currentCategory = btn.dataset.category;
            renderMenu();
        });
    });
    
    document.getElementById("cartIcon").addEventListener("click", () => {
        document.getElementById("cartModal").classList.add("show");
    });
    
    document.getElementById("closeCartBtn").addEventListener("click", () => {
        document.getElementById("cartModal").classList.remove("show");
    });
    
    document.getElementById("confirmOrderBtn").addEventListener("click", () => {
        if (sendWhatsAppOrder()) {
            document.getElementById("cartModal").classList.remove("show");
        }
    });
    
    document.getElementById("footerOrderBtn").addEventListener("click", () => {
        document.getElementById("cartModal").classList.add("show");
    });
    
    // إغلاق المودال عند الضغط خارج المحتوى
    window.addEventListener("click", (e) => {
        const modal = document.getElementById("cartModal");
        if (e.target === modal) {
            modal.classList.remove("show");
        }
    });
    
    // تهيئة الصفحة
    renderMenu();
    updateCartUI();
</script>

</body>
</html>
